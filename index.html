<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f4f4f4">
  <link rel="icon" href="icon-192.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Catch the Box</title>
  <style>
    :root {
      --sky-top: #87dcff;
      --sky-bottom: #fff6ad;
      --card-top: #ffffff;
      --card-bottom: #fff0fb;
      --ink: #25304a;
      --pink: #ff5fa2;
      --yellow: #ffd84d;
      --blue: #4f9cff;
      --mint: #87e7c4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
      color: var(--ink);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 420px;
      text-align: center;
      background: linear-gradient(180deg, var(--card-top), var(--card-bottom));
      border: 4px solid #ffffff;
      border-radius: 28px;
      padding: 22px 18px 24px;
      box-shadow: 0 18px 40px rgba(67, 79, 122, 0.22);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 2rem;
      color: #ff4f93;
      letter-spacing: 0.04em;
      text-shadow: 0 3px 0 rgba(255, 255, 255, 0.9);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      background: #ffffff;
      border-radius: 18px;
      padding: 10px 8px;
      box-shadow: 0 8px 18px rgba(86, 101, 145, 0.14);
      border: 2px solid rgba(255, 255, 255, 0.9);
    }

    .stat-label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.78rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #5f6f96;
    }

    .stat-value {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--ink);
    }

    .game-area {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background:
        radial-gradient(circle at top left, #ffffff, transparent 35%),
        linear-gradient(180deg, #dff7ff, #ffffff 42%, #fff5c9);
      border: 4px solid #ffffff;
      border-radius: 24px;
      overflow: hidden;
      touch-action: manipulation;
      box-shadow: inset 0 0 0 3px rgba(79, 156, 255, 0.12);
    }

    .box {
      position: absolute;
      width: 56px;
      height: 56px;
      background: linear-gradient(180deg, #ff8fb8, var(--pink));
      border: 3px solid #ffffff;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(255, 95, 162, 0.35);
    }

    .message {
      margin-top: 14px;
      min-height: 28px;
      font-size: 1rem;
      font-weight: bold;
      color: #5a6280;
    }

    .restart-btn {
      display: none;
      margin-top: 14px;
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--yellow), #ffbc42);
      color: #5c4300;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(255, 188, 66, 0.35);
    }

    .restart-btn.show {
      display: inline-block;
    }

    @media (max-width: 420px) {
      .app {
        padding: 20px 14px 22px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .stat-value {
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Catch the Box</h1>

    <div class="stats">
      <div class="stat">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="score">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Best</span>
        <span class="stat-value" id="highScore">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Time</span>
        <span class="stat-value"><span id="timer">20</span>s</span>
      </div>
    </div>

    <div class="game-area" id="gameArea">
      <button class="box" id="box" aria-label="Catch the box"></button>
    </div>

    <div class="message" id="message"></div>
    <button class="restart-btn" id="restartBtn">Restart</button>
  </main>

  <script>
    const gameArea = document.getElementById("gameArea");
    const box = document.getElementById("box");
    const scoreText = document.getElementById("score");
    const highScoreText = document.getElementById("highScore");
    const timerText = document.getElementById("timer");
    const message = document.getElementById("message");
    const restartBtn = document.getElementById("restartBtn");

    const gameDuration = 20;
    const boxSize = 56;
    const highScoreKey = "catchTheBoxHighScore";

    let score = 0;
    let timeLeft = gameDuration;
    let timerId = null;
    let gameRunning = false;
    let highScore = Number(localStorage.getItem(highScoreKey)) || 0;

    highScoreText.textContent = highScore;

    function moveBox() {
      const maxX = gameArea.clientWidth - boxSize;
      const maxY = gameArea.clientHeight - boxSize;

      const randomX = Math.floor(Math.random() * (maxX + 1));
      const randomY = Math.floor(Math.random() * (maxY + 1));

      box.style.left = randomX + "px";
      box.style.top = randomY + "px";
    }

    function endGame() {
      gameRunning = false;
      clearInterval(timerId);

      if (score > highScore) {
        highScore = score;
        localStorage.setItem(highScoreKey, highScore);
        highScoreText.textContent = highScore;
      }

      box.style.display = "none";
      restartBtn.classList.add("show");
      message.textContent = "Game over! Final score: " + score;
    }

    function startGame() {
      score = 0;
      timeLeft = gameDuration;
      gameRunning = true;

      scoreText.textContent = score;
      timerText.textContent = timeLeft;
      message.textContent = "";
      restartBtn.classList.remove("show");
      box.style.display = "block";

      moveBox();

      clearInterval(timerId);
      timerId = setInterval(function () {
        timeLeft -= 1;
        timerText.textContent = timeLeft;

        if (timeLeft === 0) {
          endGame();
        }
      }, 1000);
    }

    box.addEventListener("click", function () {
      if (!gameRunning) {
        return;
      }

      score += 1;
      scoreText.textContent = score;
      moveBox();
    });

    restartBtn.addEventListener("click", startGame);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js");
      });
    }

    startGame();
  </script>
</body>
</html>
